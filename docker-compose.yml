services:
  crew-personal-agents:
    build:
      context: .
      dockerfile: Dockerfile
    image: crew-personal-agents:latest
    container_name: crew-personal-agents
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      WEBUI_HOST: 0.0.0.0
      WEBUI_PORT: 8787
      PYTHONUNBUFFERED: "1"
    ports:
      - "8787:8787"
    volumes:
      - ./users:/app/users
      - ./watcher/data:/app/watcher/data
      - ./logs:/app/logs
      - ./core/logs:/app/core/logs
      - ./skills:/app/skills
      - ./watcher:/app/watcher
      - ./core:/app/core
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/health', timeout=5).read()" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
